<!DOCTYPE html>
<html lang="en">

<head>

<title>Admin Dashboard | K. Garden Groove College Buddo</title>

<link rel="stylesheet" href="admin.css">

</head>


<body>


<div class="sidebar">

<h2>🎓 Admin Panel</h2>


<a href="#">Dashboard</a>

<a href="#announcements">
Announcements
</a>

<a href="#gallery">
Gallery
</a>

<a href="#admissions">
Admissions
</a>

<a href="#messages">
Messages
</a>

<a href="#students">
Students
</a>


<button onclick="logout()">
Logout
</button>


</div>





<div class="content">


<h1>
Welcome Admin
</h1>



<!-- ANNOUNCEMENTS MANAGEMENT -->

<section id="announcements">

<h2>📢 Manage School Announcements</h2>


<input 
type="text"
id="announcementTitle"
placeholder="Announcement title">


<textarea 
id="announcementText"
placeholder="Write announcement">
</textarea>


<button onclick="addAnnouncement()">
Publish Announcement
</button>


<div id="announcementList"></div>


</section>






<!-- GALLERY -->

<section id="gallery">


<h2>📸 Gallery Management</h2>


<input 
type="text"
id="image"
placeholder="Image URL">


<button onclick="addImage()">
Add Image
</button>


<div id="galleryList"></div>


</section>








<!-- ADMISSIONS -->

<section id="admissions">


<h2>📝 Admission Applications</h2>


<div id="applications">

No applications yet.

</div>


</section>







<!-- MESSAGES -->

<section id="messages">


<h2>📩 Contact Messages</h2>


<div id="messagesList">

No messages yet.

</div>


</section>








<!-- STUDENTS -->

<section id="students">


<h2>🎓 Student Records</h2>


<input 
id="student"
placeholder="Student Name">


<button onclick="addStudent()">
Add Student
</button>


<ul id="studentList"></ul>


</section>



</div>




<script src="admin.js"></script>


</body>

</html>
